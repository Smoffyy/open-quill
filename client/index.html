<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>open-quill</title>
    <script>
      (function () {
        var BG = { light: '#f4f3ee', dark: '#1f1f1e', anthropic: '#1f1f1e', oled: '#000000' };
        try {
          var t = localStorage.getItem('oq-theme');
          if (t === 'dark') t = 'anthropic';
          if (t !== 'light' && t !== 'anthropic' && t !== 'oled') {
            t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'anthropic';
          }
          document.documentElement.setAttribute('data-theme', t);
          document.documentElement.style.background = BG[t] || BG.anthropic;
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'anthropic');
          document.documentElement.style.background = '#1f1f1e';
        }
      })();
    </script>
    <style>html{background:#1f1f1e}html[data-theme="light"]{background:#f4f3ee}html[data-theme="anthropic"]{background:#1f1f1e}html[data-theme="oled"]{background:#000}</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
